name: Protected Files

on:
  pull_request:
  push:

jobs:
  protected-files:
    name: Protected source-of-truth files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify protected files
        run: python scripts/check_protected_files.py
